@media(max-width:800px){.submit-view{grid-template-columns:1fr}.dash-stats{grid-template-columns:repeat(3,1fr)}.nav-tabs{margin-left:8px}}
</style>`;

html += '<div class="pbar"><div class="bf" id="bf"></div></div><div id="pc"><div style="text-align:center;padding:80px 20px;color:var(--text3)"><div style="font-size:48px;margin-bottom:12px;opacity:0.3">📋</div><p>Fill in the form and click Submit<br>to see the ticket flow in action</p></div></div></div></div>';

// Dashboard view
html += '<div class="view dash-view" id="dv"><div class="dash-stats" id="dstats"></div>';
html += '<div class="dash-filters"><span style="font-size:11px;color:var(--text3)">Filter:</span>';
html += '<select class="df-sel" id="fD" onchange="renderD()"><option value="">All depts</option><option value="ua">UA</option><option value="engineering">Engineering</option><option value="qa">QA</option><option value="creative">Creative</option><option value="product">Product</option><option value="finance">Finance</option><option value="ops">Ops</option></select>';
html += '<select class="df-sel" id="fS" onchange="renderD()"><option value="">All statuses</option><option>Open</option><option>In Progress</option><option>Resolved</option><option>Closed</option></select>';
html += '<select class="df-sel" id="fV" onchange="renderD()"><option value="">All severities</option><option>Highest</option><option>High</option><option>Medium</option><option>Low</option></select>';
html += '<input class="df-search" id="fQ" placeholder="Search tickets..." oninput="renderD()"/></div>';
html += '<div class="table-wrap"><table class="tt"><thead><tr><th>Ticket ID</th><th>Title</th><th>Department</th><th>Reported by</th><th>Severity</th><th>Status</th><th>Date</th></tr></thead><tbody id="tb"></tbody></table></div></div>';

// Modal
html += '<div class="modal-bg" id="mbg" onclick="if(event.target===this)cM()"><div class="modal" id="mc"></div></div>';

document.getElementById('app').innerHTML += html;

function switchTab(t){
  document.querySelectorAll('.nav-tab').forEach(function(n){n.classList.remove('active')});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  if(t==='submit'){document.querySelectorAll('.nav-tab')[0].classList.add('active');document.getElementById('sv').classList.add('active')}
  else{document.querySelectorAll('.nav-tab')[1].classList.add('active');document.getElementById('dv').classList.add('active');renderD()}
}

function renderD(){
  var fd=document.getElementById('fD').value,fs=document.getElementById('fS').value,fv=document.getElementById('fV').value,fq=document.getElementById('fQ').value.toLowerCase();
  var f=tickets.filter(function(t){
    if(fd&&t.dept!==fd)return false;if(fs&&t.status!==fs)return false;if(fv&&t.severity!==fv)return false;
    if(fq&&t.title.toLowerCase().indexOf(fq)===-1&&t.id.toLowerCase().indexOf(fq)===-1&&t.name.toLowerCase().indexOf(fq)===-1)return false;return true;
  });
  var o=0,p=0,r=0,cl=0;tickets.forEach(function(t){if(t.status==='Open')o++;else if(t.status==='In Progress')p++;else if(t.status==='Resolved')r++;else cl++});
  document.getElementById('dstats').innerHTML='<div class="ds-card"><div class="ds-val" style="color:var(--blue)">'+tickets.length+'</div><div class="ds-lbl">Total</div></div><div class="ds-card"><div class="ds-val" style="color:var(--blue)">'+o+'</div><div class="ds-lbl">Open</div></div><div class="ds-card"><div class="ds-val" style="color:var(--amber)">'+p+'</div><div class="ds-lbl">In progress</div></div><div class="ds-card"><div class="ds-val" style="color:var(--green)">'+r+'</div><div class="ds-lbl">Resolved</div></div><div class="ds-card"><div class="ds-val" style="color:var(--text3)">'+cl+'</div><div class="ds-lbl">Closed</div></div>';
  var b=document.getElementById('tb');
  if(!f.length){b.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3)">No tickets match filters</td></tr>';return}
  var h='';f.forEach(function(t){
    var c=DC[t.dept]||{};var sc=t.status==='Open'?'sb-open':t.status==='In Progress'?'sb-prog':t.status==='Resolved'?'sb-res':'sb-cls';
    h+='<tr onclick="oM('+tickets.indexOf(t)+')"><td class="t-id">'+t.id+'</td><td class="t-title">'+t.title+'</td><td><span class="dd" style="background:'+(c.color||'#666')+'"></span>'+(c.dn||t.dept)+'</td><td class="t-name">'+t.name+'</td><td><span class="sv sv-'+t.severity.toLowerCase()+'">'+t.severity+'</span></td><td><span class="sb '+sc+'">'+t.status+'</span></td><td class="t-date">'+t.date+'</td></tr>';
  });b.innerHTML=h;document.getElementById('tc').textContent=tickets.length;
}

function oM(i){
  var t=tickets[i],c=DC[t.dept]||{};var sc=t.status==='Open'?'sb-open':t.status==='In Progress'?'sb-prog':t.status==='Resolved'?'sb-res':'sb-cls';
  var h='<button class="m-close" onclick="cM()">&times;</button>';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-family:var(--mono);color:var(--amber);font-size:13px;font-weight:600">'+t.id+'</span><span class="sb '+sc+'">'+t.status+'</span><span class="sv sv-'+t.severity.toLowerCase()+'">'+t.severity+'</span></div>';
  h+='<h3>'+t.title+'</h3>';
  h+='<div class="m-row"><div class="m-lbl">Department</div><div class="m-val"><span class="dd" style="background:'+(c.color||'#666')+'"></span>'+(c.dn||t.dept)+'</div></div>';
  h+='<div class="m-row"><div class="m-lbl">Reported by</div><div class="m-val">'+t.name+'</div></div>';
  h+='<div class="m-row"><div class="m-lbl">Email</div><div class="m-val" style="color:var(--blue)">'+t.email+'</div></div>';
  if(t.team)h+='<div class="m-row"><div class="m-lbl">Team</div><div class="m-val">'+t.team+'</div></div>';
  if(t.game)h+='<div class="m-row"><div class="m-lbl">Game</div><div class="m-val">'+t.game+'</div></div>';
  h+='<div class="m-row"><div class="m-lbl">Type</div><div class="m-val">'+t.type+'</div></div>';
  h+='<div class="m-row"><div class="m-lbl">Platform</div><div class="m-val">'+t.platform+'</div></div>';
  h+='<div class="m-row"><div class="m-lbl">Date</div><div class="m-val">'+t.date+'</div></div>';
  if(c.leads)h+='<div class="m-row"><div class="m-lbl">Assigned to</div><div class="m-val" style="color:var(--blue)">'+c.leads.join(', ')+'</div></div>';
  h+='<div style="font-size:11px;font-weight:600;color:var(--text2);margin-top:14px">Description</div><div class="m-desc">'+t.desc+'</div>';
  h+='<div style="font-size:11px;font-weight:600;color:var(--text2);margin-top:10px">Update status</div><div class="m-status-row">';
  ['Open','In Progress','Resolved','Closed'].forEach(function(s){h+='<div class="m-sb'+(t.status===s?' act':'')+'" onclick="uS('+i+',\''+s+'\')">'+s+'</div>'});
  h+='</div>';
  document.getElementById('mc').innerHTML=h;document.getElementById('mbg').classList.add('show');
}
function cM(){document.getElementById('mbg').classList.remove('show')}
function uS(i,s){tickets[i].status=s;oM(i);renderD()}

function onDC(){var d=document.getElementById('dept').value,c=DC[d]||{};document.getElementById('tG').style.display=c.showTeam?'block':'none';document.getElementById('gG').style.display=c.showGame?'block':'none';document.getElementById('pG').style.display=c.showPlat?'block':'none'}
function setSev(el,v){severity=v;document.querySelectorAll('.sp').forEach(function(p){p.classList.remove('active')});el.classList.add('active')}
function sevClass(s){return s==='Highest'?'sev-highest':s==='High'?'sev-high':s==='Medium'?'sev-medium':'sev-low'}
function sevEmoji(s){return s==='Highest'?'🔴':s==='High'?'🟠':s==='Medium'?'🟡':'🟢'}

function submitTicket(){
  var dept=document.getElementById('dept').value;if(!dept){alert('Select a department');return}
  var nm=document.getElementById('nm').value||'Hadi Durrani',em=document.getElementById('em').value||'abdulhadi@gamedistrict.co',tm=document.getElementById('tm').value||'GD Main',gm=document.getElementById('gm').value||'Arrow',it=document.getElementById('it').value,pl=document.getElementById('pl').value,ti=document.getElementById('ti').value||'Automation',ds=document.getElementById('ds').value||'Please';
  var c=DC[dept],tn=c.prefix+'-'+Math.random().toString(36).substr(2,8).toUpperCase(),now=new Date(),ts=now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),dateStr=now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  tickets.unshift({id:tn,title:ti,dept:dept,name:nm,email:em,team:tm,game:gm,type:it,platform:pl,severity:severity,status:'Open',date:now.toISOString().split('T')[0],desc:ds});
  document.getElementById('tc').textContent=tickets.length;
  var btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Processing...';
  ['s1','s2','s3','s4'].forEach(function(id){document.getElementById(id).className='si-s'});
  var bar=document.getElementById('bf');bar.style.width='0%';bar.style.background='var(--blue)';var pc=document.getElementById('pc');pc.innerHTML='';
  var tl=c.showTeam?'<strong>Team:</strong> '+tm+'\n':'',gl=c.showGame?'<strong>Game Title:</strong> '+gm+'\n':'',pll=c.showPlat?'<strong>Issue Platform:</strong> '+pl+'\n':'',eu=em.split('@')[0];

  setTimeout(function(){document.getElementById('s1').className='si-s active';bar.style.width='25%';
    pc.innerHTML+='<div class="stl"><span class="sn" style="background:var(--blue-bg);color:var(--blue)">STEP 1</span><span class="st" style="color:var(--blue)">Ticket posted to '+c.space+'</span></div><div class="gc-win" id="gw1"><div class="gc-top"><span>You</span>&nbsp;&nbsp;<span class="gc-bot-name">GD Ticket Bot</span>&nbsp;&nbsp;<span class="gc-ts">'+ts+'</span></div><div class="gc-body"><div class="gc-bubble">🎫 <strong>Ticket:</strong> <span class="tnum">'+tn+'</span>\n\n📌 <strong>New Issue Report</strong>\n\n<strong>By:</strong> '+nm+'\n<strong>Email:</strong> '+em+'\n'+tl+gl+'<strong>Type:</strong> '+it+'\n'+pll+'<strong>Title:</strong> '+ti+'\n<strong>Desc:</strong>\n'+ds+'\n<strong>Severity:</strong> <span class="'+sevClass(severity)+'">'+severity+'</span></div></div><div class="gc-bottom"><span style="font-size:18px;color:#5f6368">+</span><input class="gc-input" placeholder="Message '+c.space+'" disabled/></div></div>';
    setTimeout(function(){document.getElementById('gw1').classList.add('visible')},50);
  },600);
  setTimeout(function(){document.getElementById('s1').className='si-s done';document.getElementById('s2').className='si-s active';bar.style.width='50%';
    var mn=c.leads.map(function(l){return'<span class="mention">'+l+'</span>'}).join('&nbsp;&nbsp;');
    var gr=c.showGame?(gm+(c.showTeam?' ('+tm+')':'')):(c.showTeam?tm:'General');
    pc.innerHTML+='<div class="stl"><span class="sn" style="background:var(--green-bg);color:var(--green)">STEP 2</span><span class="st" style="color:var(--green)">Thread reply — team tagged</span></div><div class="gc-win" id="gw2" style="margin-left:16px"><div class="gc-body"><div class="gc-reply">🚨 <strong>Assigned — <span style="color:#b45309">'+tn+'</span></strong>\n\n'+mn+'\n\n📋 '+gr+'\n🐛 '+ti+'\n'+sevEmoji(severity)+' <span class="'+sevClass(severity)+'">'+severity+'</span>\n👤 '+nm+'\n\nPlease review ☝️</div></div></div>';
    setTimeout(function(){document.getElementById('gw2').classList.add('visible')},50);
  },1600);
  setTimeout(function(){document.getElementById('s2').className='si-s done';document.getElementById('s3').className='si-s active';bar.style.width='75%';
    pc.innerHTML+='<div class="stl"><span class="sn" style="background:var(--amber-bg);color:var(--amber)">STEP 3</span><span class="st" style="color:var(--amber)">DM to '+nm+'</span></div><div class="dm-win" id="gw3"><div class="dm-top"><div class="dm-av" style="background:'+c.color+'">GD</div><div class="dm-name">GD Ticket Bot</div></div><div class="dm-body"><div class="dm-bubble">Assalamoalikum '+nm+'\nHow are you\n\nWe have received your ticket <strong><span style="color:#b45309">'+tn+'</span></strong>. Our team will contact you soon.\n\nFeel free to reply here with more details.</div></div></div>';
    setTimeout(function(){document.getElementById('gw3').classList.add('visible')},50);
  },2600);
  setTimeout(function(){document.getElementById('s3').className='si-s done';document.getElementById('s4').className='si-s active';bar.style.width='100%';
    pc.innerHTML+='<div class="stl"><span class="sn" style="background:var(--purple-bg);color:var(--purple)">STEP 4</span><span class="st" style="color:var(--purple)">Email sent</span></div><div class="gmail" id="gw4"><div class="gmail-header"><div class="gmail-subject">Issue Received – '+tn+' <span class="gmail-tag">'+c.emailTag+'</span></div><div class="gmail-from"><div class="gmail-av-p" style="background:'+c.color+'">G</div><div style="flex:1"><div style="display:flex;align-items:center"><span class="gmail-sender">'+c.emailTeam+'</span><span class="gmail-date" style="margin-left:auto">'+dateStr+'</span></div><div class="gmail-to">to '+eu+', team</div></div></div></div><div class="gmail-body">Hello,\n\nWe received your request.\n\n🎫 '+tn+'\nTitle: '+ti+'\nSeverity: '+severity+'\n\nOur team will contact you shortly.\n\nBest regards,\n'+c.emailTeam+'</div><div class="gmail-footer"><div class="gmail-btn">↩ Reply</div><div class="gmail-btn">↩↩ Reply all</div><div class="gmail-btn">↪ Forward</div></div></div>';
    setTimeout(function(){document.getElementById('gw4').classList.add('visible')},50);
  },3600);
  setTimeout(function(){document.getElementById('s4').className='si-s done';bar.style.background='var(--green)';
    pc.innerHTML+='<div class="result-banner" id="gw5"><div style="font-size:14px;font-weight:700;color:var(--green)">Ticket processed</div><div style="font-size:11px;color:var(--text2)">All 4 actions done. Check Dashboard tab to see your ticket.</div></div>';
    setTimeout(function(){document.getElementById('gw5').classList.add('visible')},50);
    btn.disabled=false;btn.textContent='Submit another ticket';
  },4400);
}
renderD();
</script>
